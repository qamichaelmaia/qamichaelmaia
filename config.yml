# Galaxy Profile README Configuration
# Copy this file to config.yml and customize it to make it your own!
#
# Usage:
#   cp config.example.yml config.yml
#   # Edit config.yml with your details
#   python -m generator.main
#
# Demo mode (no API calls, uses this file directly):
#   python -m generator.main --demo

# Your GitHub username (required)
username: qamichaelmaia

# Profile information displayed in the galaxy header
profile:
  name: "Michael Maia"
  tagline: "QA Engineer | SDET | Mentor"
  company: ""
  location: "Bahia, Brazil"
  bio: |
    I hold a degree in Software Quality Engineering (EBAC) and a degree in Systems Analysis and Development (FACINT). With 4+ years of experience, I currently lead the technical QA front at Checkmob, a web/mobile platform for field team management.
    I also have previous experience at Pris (BTG Pactual group), Pipoca Agil, and Crowdtest, working with test planning, manual testing, automation, and usability testing for brands such as Serasa, Natura, C&A, and Meu Patrocinio.

  philosophy: '"Master valuable skills and be smarter than the competition." - Scot H. Young'

# Social links displayed at the bottom of the profile
social:
  email: "contatomichaelmaia@gmail.com"
  linkedin: "qamichael"
  website: "https://playground-for-qa.vercel.app/autor"

# Galaxy arms represent your core focus areas
# Each arm spirals out from the center with its own color and tech items
# Available colors: "synapse_cyan", "dendrite_violet", "axon_amber"
galaxy_arms:
  - name: "QA Automation"
    color: "dendrite_violet"
    items:
      - "Playwright"
      - "Cypress"
      - "Selenium"
      - "Appium"
      - "Robot Framework"
      - "Postman"
      - "JavaScript"
      - "Python"
      - "Java"
  - name: "API & Performance"
    color: "synapse_cyan"
    items:
      - "GraphQL"
      - "PactumJS"
      - "Cypress CRUD"
      - "k6"
      - "JMeter"
      - "SQL Server"
      - "MySQL"
      - "MongoDB"
  - name: "CI/CD & QA Ops"
    color: "axon_amber"
    items:
      - "GitHub Actions"
      - "Azure DevOps"
      - "GitLab CI"
      - "Jenkins"
      - "Docker"
      - "Jira"
      - "Qase"
      - "Zephyr"
      - "Git"

# Featured projects shown as constellation stars
# Each project needs:
#   repo: "owner/repo-name"   — GitHub repository path
#   arm: 0-2                  — Which galaxy arm to associate with (index)
#   description: "..."        — Short description shown on the card
projects:
  - repo: "qamichaelmaia/QA Playground"
    arm: 0
    description: "QA playground with practical test and automation content."
  - repo: "qamichaelmaia/API Test Automation"
    arm: 1
    description: "API automation project focused on quality, reliability, and scale."
  - repo: "qamichaelmaia/Application Mobile Test"
    arm: 0
    description: "Mobile testing automation scenarios and validation strategies."

# Theme color overrides (optional — defaults to deep space palette)
# All values must be valid hex color codes (#RRGGBB)
theme:
  void: "#080c14"              # Darkest background
  nebula: "#0f1623"            # Card backgrounds
  star_dust: "#1a2332"         # Borders, dividers
  synapse_cyan: "#00d4ff"      # Primary accent (arm color 1)
  dendrite_violet: "#a78bfa"   # Secondary accent (arm color 2)
  axon_amber: "#ffb020"        # Tertiary accent (arm color 3)
  text_bright: "#f1f5f9"       # Primary text
  text_dim: "#94a3b8"          # Secondary text
  text_faint: "#64748b"        # Muted text, labels

# Stats configuration — which metrics to show on the telemetry card
stats:
  metrics:
    - "commits"
    - "stars"
    - "prs"
    - "issues"
    - "repos"

# Language display settings
languages:
  exclude:                     # Languages to hide from the telemetry chart
    - "HTML"
    - "CSS"
    - "Shell"
    - "Makefile"
  max_display: 8               # Maximum number of languages to show
